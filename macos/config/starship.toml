# ~/.config/starship.toml - fast, informative prompt for ML/DevOps work.
# Docs: https://starship.rs/config/

# Keep the prompt on two lines: info line + a clean input line.
format = """
$directory$git_branch$git_status$python$kubernetes$terraform${custom.gcloud}$aws$cmd_duration
$character"""

add_newline = true
command_timeout = 500   # ms; keep modules from stalling the prompt

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"

[git_branch]
symbol = " "
style = "bold purple"

[git_status]
style = "bold yellow"
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
modified = "!${count}"
staged = "+${count}"
stashed = "*${count}"

# Show the active Python venv/version — critical for ML work.
[python]
symbol = " "
format = '[${symbol}${pyenv_prefix}(${version})(\($virtualenv\))]($style) '
style = "bold yellow"

# Kubernetes context/namespace — only shows in dirs with k8s manifests by default.
[kubernetes]
symbol = "☸ "
format = '[$symbol$context( \($namespace\))]($style) '
style = "bold blue"
disabled = false

[terraform]
symbol = "󱁢 "
format = '[$symbol$workspace]($style) '
style = "bold 105"

# Built-in gcloud shows in every dir; disable it and use the context-aware
# custom module below so gcloud only appears near actual GCP work.
[gcloud]
disabled = true

# custom.gcloud: only render when the current dir looks like GCP work
# (App Engine, Cloud Build, Functions, gcloud ignore files). Shows the
# active configuration's project so you know which GCP env you're touching.
[custom.gcloud]
description = "Show active gcloud project only in GCP project dirs"
command = "gcloud config get-value project 2>/dev/null"
detect_files = ["app.yaml", "app.yml", "cloudbuild.yaml", "cloudbuild.yml", ".gcloudignore"]
detect_folders = [".gcloud"]
symbol = " "
format = "[$symbol$output]($style) "
style = "bold blue"
# Cache is cheap, but guard against a slow/hanging gcloud call.
shell = ["bash", "--noprofile", "--norc"]

[aws]
symbol = " "
format = '[$symbol$profile(\($region\))]($style) '
style = "bold orange"

[cmd_duration]
min_time = 2000
format = "[ ${duration}]($style)"
style = "bold yellow"
